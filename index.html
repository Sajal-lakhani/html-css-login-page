<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
  font-family: Arial;
  background: #f0f0f0;
  text-align: center;
}

.login-box {
  background: white;
  width: 300px;
  margin: 100px auto;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0px 0px 10px gray;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
}

button {
  background: blue;
  color: white;
  padding: 10px;
  border: none;
  width: 100%;
}
</style>

</head>

<body>

<div class="login-box">
  <h2>Login</h2>
  <input type="text" placeholder="Username">
  <input type="password" placeholder="Password">
  <button>Login</button>
</div>

</body>
</html>
